<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практическое занятие 11</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="main-title">Практическое занятие 11: Манипуляции с DOM</h1>

    <div class="task-section">
        <h2 class="task-title">Задание №1: Генерация списка</h2>
        <div id="task1-container"></div>
    </div>

    <div class="task-section">
        <h2 class="task-title">Задание №2: Работа с селекторами</h2>
        <div id="task2-container">
            <div id="container">
                <p class="text">Первый параграф</p>
                <p class="text special">Второй параграф</p>
                <p class="text">Третий параграф</p>
                <p class="text">Четвёртый параграф</p>
            </div>
        </div>
    </div>

    <div class="task-section">
        <h2 class="task-title">Задание №3: Data-атрибуты и вычисления</h2>
        <div id="task3-container">
            <div class="item" data-price="100">Товар 1</div>
            <div class="item active" data-price="200">Товар 2</div>
            <div class="item" data-price="150">Товар 3</div>
            <div id="total-price" class="total-display"></div>
        </div>
    </div>

    <script src="scripts/script.js"></script>
</body>
</html>
